<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Diego's Adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #ui {
      color: #fff;
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      gap: 30px;
      align-items: center;
    }
    #ui span { color: #ffd700; font-weight: bold; }
    canvas {
      border: 3px solid #444;
      display: block;
      image-rendering: pixelated;
    }
    #message-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #fff;
      font-family: 'Courier New', monospace;
      z-index: 10;
    }
    #message-overlay.active { display: flex; }
    #message-overlay h2 { font-size: 28px; color: #ffd700; margin-bottom: 16px; }
    #message-overlay p { font-size: 18px; margin-bottom: 12px; letter-spacing: 2px; }
    #message-overlay .collected { color: #7df5a0; font-size: 22px; letter-spacing: 6px; }
    #message-overlay .hint { color: #aaa; font-size: 13px; margin-top: 8px; }
    #message-overlay input {
      margin-top: 16px;
      padding: 8px 14px;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      background: #222;
      color: #fff;
      border: 2px solid #ffd700;
      border-radius: 4px;
      text-align: center;
      letter-spacing: 4px;
    }
    #message-overlay button {
      margin-top: 12px;
      padding: 8px 24px;
      font-size: 16px;
      background: #ffd700;
      color: #111;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }
    #message-overlay button:hover { background: #ffec5c; }
    #message-overlay .error { color: #ff5c5c; margin-top: 8px; font-size: 14px; }
    #overlay-joke {
      margin-top: 18px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.07);
      border-left: 4px solid #ffd700;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      white-space: pre-line;
      max-width: 420px;
      text-align: left;
      line-height: 1.6;
    }
    #overlay-joke::before {
      content: '😂 Blague du niveau : ';
      display: block;
      color: #ffd700;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>NIVEAU : <span id="ui-level">1 - GLACE</span></div>
    <div>ÉTOILES : <span id="ui-stars">0/5</span></div>
    <div>LETTRES : <span id="ui-letters">_____</span></div>
  </div>
  <canvas id="gameCanvas" width="900" height="500"></canvas>

  <div id="message-overlay">
    <h2 id="overlay-title">Niveau terminé !</h2>
    <p>Lettres collectées :</p>
    <div class="collected" id="overlay-letters"></div>
    <p class="hint" id="overlay-hint"></p>
    <div id="overlay-joke"></div>
    <p style="color:#aaa; font-size:13px; margin-top:14px; margin-bottom:6px;">
      ✏️ Tape le mot formé par les lettres ci-dessus :
    </p>
    <input type="text" id="overlay-input" placeholder="Ton mot..."
      maxlength="5" autocomplete="off" autocorrect="off" spellcheck="false"
      onclick="this.focus()"
      style="font-size:24px; letter-spacing:8px; text-transform:uppercase;"
    />
    <div class="error" id="overlay-error"></div>
    <button onclick="checkAnswer()">VALIDER →</button>
  </div>

  <script src="js/music.js"></script>
  <script src="js/game.js"></script>
  <script>
    // Force majuscules + bouton mute
    document.addEventListener('DOMContentLoaded', () => {
      createMuteButton();
      const inp = document.getElementById('overlay-input');
      inp.addEventListener('input', () => { inp.value = inp.value.toUpperCase(); });
    });
  </script>
</body>
</html>
