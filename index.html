<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Diego's Adventure</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
    html, body {
      background:#111;
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-start;
      overflow:hidden; font-family:'Courier New',monospace;
    }

    /* Conteneur principal — limité à 100vw et hauteur dispo */
    #game-wrapper {
      width:100%; max-width:440px;
      display:flex; flex-direction:column;
      align-items:stretch;
      height:100vh; overflow:hidden;
    }

    /* HUD */
    #ui {
      width:100%;
      display:flex; justify-content:space-between;
      padding:5px 10px; background:#1a1a1a;
      color:#fff; font-size:12px;
      border-bottom:2px solid #333; flex-shrink:0;
    }
    #ui span { color:#ffd700; font-weight:bold; }

    /* Canvas : ratio 9/16 strict — pas d'étirement */
    #canvas-wrapper {
      width:100%; flex:1 1 auto;
      position:relative; overflow:hidden;
      background:#111;
      display:flex; align-items:center; justify-content:center;
    }
    canvas {
      /* Occupe toute la hauteur dispo, largeur calculée pour 9/16 */
      height:100%; width:auto;
      max-width:100%;
      image-rendering:pixelated;
      display:block;
    }

    /* Zone contrôle tactile */
    #touch-pad {
      width:100%; height:130px; flex-shrink:0;
      background:#161616; border-top:2px solid #333;
      position:relative;
      cursor:pointer; user-select:none; -webkit-user-select:none;
    }
    /* Ligne centrale verticale — repère visuel */
    #touch-pad::before {
      content:'';
      position:absolute; left:50%; top:10%; bottom:10%;
      width:2px; background:rgba(255,215,0,0.25);
      transform:translateX(-50%);
    }
    /* Point central */
    #touch-pad::after {
      content:'↑';
      position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      font-size:22px; color:rgba(255,215,0,0.35);
      pointer-events:none;
    }
    /* Indicateur de zone gauche/droite */
    #pad-left-hint, #pad-right-hint {
      position:absolute; top:50%; transform:translateY(-50%);
      font-size:18px; color:rgba(255,255,255,0.15);
      pointer-events:none;
    }
    #pad-left-hint  { left:12px; }
    #pad-right-hint { right:12px; }
    /* Curseur visuel de position du doigt */
    #pad-cursor {
      position:absolute; width:44px; height:44px;
      border-radius:50%; border:3px solid rgba(255,215,0,0.6);
      background:rgba(255,215,0,0.12);
      transform:translate(-50%,-50%);
      pointer-events:none; display:none;
    }

    /* OVERLAY */
    #message-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.93);
      flex-direction:column; align-items:center; justify-content:center;
      gap:8px; padding:16px; z-index:9999;
      color:#fff; font-family:'Courier New',monospace;
    }
    #message-overlay.active { display:flex; }
    #message-overlay h2 { font-size:20px; color:#ffd700; text-align:center; }
    .hint-txt { color:#aaa; font-size:11px; text-align:center; }
    #overlay-letters { display:flex; gap:6px; }
    .letter-slot {
      width:42px; height:48px; line-height:48px; border-radius:7px;
      font-size:22px; font-weight:bold; text-align:center;
      background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.2);
      border:2px solid rgba(255,255,255,0.1);
    }
    .letter-slot.found {
      background:#ffd700; color:#1a0a00;
      border-color:#ffec5c; box-shadow:0 0 10px #ffd70055;
    }
    #answer-display { display:flex; gap:6px; }
    .answer-slot {
      width:42px; height:48px; line-height:48px; border-radius:7px;
      font-size:22px; font-weight:bold; text-align:center;
      background:#1a1a1a; border:2px solid #ffd700; color:#fff; cursor:pointer;
    }
    #virtual-keyboard { width:100%; max-width:340px; }
    .kb-row { display:flex; gap:3px; justify-content:center; margin-bottom:3px; }
    .kb-key {
      min-width:28px; height:34px; line-height:34px; border-radius:4px;
      font-size:12px; font-weight:bold; text-align:center;
      background:#2a2a2a; border:1px solid #555; color:#fff;
      cursor:pointer; user-select:none; padding:0 3px;
    }
    .kb-key:active { background:#555; }
    .kb-backspace { background:#3a1a00; border-color:#ff6a00; color:#ff9900; min-width:42px; }
    #overlay-error { color:#ff5c5c; font-size:11px; min-height:14px; }
    #validate-btn {
      padding:9px 26px; font-size:14px; background:#ffd700; color:#111;
      border:none; border-radius:5px; cursor:pointer;
      font-family:'Courier New',monospace; font-weight:bold;
    }
    #validate-btn:disabled { background:#444; color:#777; cursor:default; }

    /* START */
    #start-screen {
      position:fixed; inset:0; background:#0a0a0a;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:99999; gap:18px; cursor:pointer;
    }
    #start-screen h1 { color:#ffd700; font-size:30px; text-align:center; line-height:1.3; }
    #start-screen p  { color:#888; font-size:13px; text-align:center; }
    .tap { color:#fff; font-size:17px; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
  </style>
</head>
<body>

  <div id="start-screen">
    <img id="diego-photo" src="wallpaper/diego-circle.png"
      onerror="this.style.display='none'"
      style="width:110px;height:110px;border-radius:50%;
             border:4px solid #ffd700;
             box-shadow:0 0 20px #ffd70088;
             object-fit:cover;display:block;">
    <h1>⭐ Diego's<br>Adventure ⭐</h1>
    <p style="color:#888;font-size:13px;text-align:center;">Collecte les étoiles<br>et trouve le mot secret !</p>
    <div style="color:#555;font-size:11px;font-family:Courier New,monospace;">v1.6</div>
    <button id="play-btn" style="
      margin-top:8px;
      padding:14px 32px;
      font-size:18px;
      font-family:Courier New,monospace;
      font-weight:bold;
      background:#ffd700;
      color:#111;
      border:none;
      border-radius:10px;
      cursor:pointer;
      box-shadow:0 4px 16px #ffd70055;
      letter-spacing:1px;
    ">▶ JOUER</button>
    <p style="color:#555;font-size:11px;font-family:Courier New,monospace;text-align:center;margin-top:-4px;">
      (active aussi la musique 🎵)
    </p>
  </div>

  <div id="game-wrapper">
  <div id="ui">
    <div>Niv.<span id="ui-level">1</span> <span id="ui-levelname">GLACE</span></div>
    <div>⭐ <span id="ui-stars">0/5</span></div>
    <div>🔤 <span id="ui-letters">_____</span></div>
    <div style="cursor:pointer;font-size:14px;" onclick="location.reload(true)" title="Rafraîchir">🔄</div>
  </div>

  <div id="canvas-wrapper"><canvas id="gameCanvas" width="360" height="640"></canvas></div>

  <div id="touch-pad">
    <div id="pad-left-hint">◀◀</div>
    <div id="pad-right-hint">▶▶</div>
    <div id="pad-cursor"></div>
  </div>

  </div><!-- /game-wrapper -->
  <div id="message-overlay">
    <h2 id="overlay-title">Niveau terminé !</h2>
    <p class="hint-txt" id="overlay-hint"></p>
    <p style="font-size:11px;color:#888;">Lettres trouvées :</p>
    <div id="overlay-letters"></div>
    <p style="font-size:11px;color:#aaa;margin-top:4px;">Tape le mot :</p>
    <input id="native-input" type="text" maxlength="5"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
      style="font-size:28px;letter-spacing:10px;text-transform:uppercase;
             background:#1a1a1a;color:#ffd700;border:2px solid #ffd700;
             border-radius:8px;padding:10px 16px;width:220px;text-align:center;
             font-family:Courier New,monospace;font-weight:bold;"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter')checkAnswer()"
    />
    <div id="overlay-error"></div>
    <button id="validate-btn" onclick="checkAnswer()">VALIDER →</button>
  </div>

  <script src="js/music.js?v=1773942609"></script>
  <script src="js/game.js?v=1773942609"></script>
</body>
</html>
